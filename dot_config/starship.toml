command_timeout = 10000

# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like ´äá to save some space
[username]
show_always = true
style_user = "bg:#B4BEFE fg:#11111B"
style_root = "bg:#B4BEFE fg:#11111B"
format = '[$user ]($style)'

[directory]
style = "bg:#F5C2E7 fg:#11111B"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "´£İ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ´£İ´ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ´£İ " = " ´£İ´ä¬ "

[git_branch]
symbol = "´Éİ"
style = "bg:#F9E2AF fg:#11111B"
format = '[¯éÂ](fg:#F9E2AF bg:#F5C2E7)[[ $symbol $branch ](bg:#F9E2AF fg:#11111B)]($style)'

[git_status]
style = "bg:#F9E2AF fg:#11111B"
format = '([[ $all_status$ahead_behind ](bg:#F9E2AF fg:#11111B)]($style))'

[custom.git_closer_when_no_node]
command = "node /Users/lirantal/.config/starship/final-segment-closer.js git"
when = true
style = "fg:#F9E2AF"
format = '[$output]($style)'

[custom.directory_closer_when_last]
command = "node /Users/lirantal/.config/starship/final-segment-closer.js directory"
when = true
style = "fg:#F5C2E7"
format = '[$output]($style)'

[nodejs]
symbol = "¯£İ"
#style = "bg:#86BBD8"
#format = '[[ $symbol ($version) ](bg:#86BBD8)]($style)'

style = "bg:#A6E3A1 fg:#11111B"
format = '[[ $symbol ($version) ](bg:#A6E3A1 fg:#11111B)]($style)'

[custom.nodejs_separator_from_git]
command = "git rev-parse --is-inside-work-tree >/dev/null 2>&1 && printf '¯éÂ'"
style = "fg:#A6E3A1 bg:#F9E2AF"
format = '[$output]($style)'
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = [
  "package.json",
  ".node-version",
  ".nvmrc",
]
detect_folders = ["node_modules"]

[custom.nodejs_separator_from_directory]
command = "! git rev-parse --is-inside-work-tree >/dev/null 2>&1 && printf '¯éÂ'"
style = "fg:#A6E3A1 bg:#F5C2E7"
format = '[$output]($style)'
