model = "gpt-5.6-sol"
model_reasoning_effort = "high"
service_tier = "default"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"

[mcp_servers.snyk-security]
command = "npx"
args = ["-y", "snyk@latest", "mcp", "-t", "stdio"]

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[features]
js_repl = false

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = true
preventSleepWhileRunning = true
show-context-window-usage = true
git-pull-request-merge-method = "merge"
git-show-sidebar-pr-icons = true
followUpQueueMode = "queue"
selected-avatar-id = "custom:grogu-kid"
avatar-overlay-mascot-width-px = 80
dock-icon-preference = "codex-system"
enabled-reasoning-efforts = ["low", "medium", "high", "xhigh"]
worktree-keep-count = 10
git-branch-prefix = "work/"
hotkey-window-projectless-default-enabled = false
notifications-turn-mode = "always"

[desktop.open-in-target-preferences]
global = "vscode"

[desktop.appearanceLightChromeTheme]
accent = "#339cff"
contrast = 45
ink = "#1a1c1f"
opaqueWindows = true
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#ba2623"
skill = "#924ff7"

[desktop.appearanceDarkChromeTheme]
accent = "#339cff"
contrast = 60
ink = "#ffffff"
opaqueWindows = true
surface = "#181818"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#40c977"
diffRemoved = "#fa423e"
skill = "#ad7bf9"
